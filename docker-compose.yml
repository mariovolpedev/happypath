version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: happypath-db
    environment:
      POSTGRES_DB: happypath
      POSTGRES_USER: happypath_user
      POSTGRES_PASSWORD: happypath_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happypath_user -d happypath"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: happypath-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: happypath-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Crea il bucket 'happypath-media' automaticamente all'avvio
  minio-init:
    image: minio/mc:latest
    container_name: happypath-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/happypath-media;
        mc anonymous set download local/happypath-media;
        echo 'Bucket happypath-media ready';
      "

  backend:
    build: ./backend
    container_name: happypath-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/happypath
      SPRING_DATASOURCE_USERNAME: happypath_user
      SPRING_DATASOURCE_PASSWORD: happypath_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      HAPPYPATH_JWT_SECRET: "change-this-in-production-must-be-256-bits-long!!"
      HAPPYPATH_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: happypath-media
      MINIO_PUBLIC_URL: http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: happypath-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
  minio_data:
