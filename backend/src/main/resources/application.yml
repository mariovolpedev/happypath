spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  application:
    name: happypath-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/happypath
    username: happypath_user
    password: happypath_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 1000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000   # 10 minuti default
      cache-null-values: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 105MB

springdoc:
  swagger-ui:
    operationsSorter: method
  api-docs:
    path: "/v3/api-docs"

management:
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: 8080
  servlet:
    context-path: "/api"

logging:
  level:
    org:
      springframework: DEBUG

happypath:
  jwt:
    secret: "happypath-super-secret-key-change-in-production-must-be-256-bits-long"
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

# MinIO / S3-compatible storage
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket: ${MINIO_BUCKET:happypath-media}
  # URL pubblico usato per costruire i link restituiti al client
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
